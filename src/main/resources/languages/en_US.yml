prefix: "<gray>[<red>Tenbatsu</red>]</gray> "

general:
  no_permission: "%prefix%<red>You don't have permission to do this."
  player_not_found: "%prefix%<red>Player <yellow>%target%</yellow> not found."
  console_only: "%prefix%<red>This command can only be run by a player."
  invalid_duration: "%prefix%<red>Invalid duration format. Use e.g. 1d, 2h, 30m."
  unknown_command: "%prefix%<red>Unknown command. Use <yellow>/notban help</yellow>."
  teleported_successfully: "%prefix%<yellow>Teleported to %player% successfully!"


ban:
  success: "%prefix%<green>Player <yellow>%target%</yellow> has been banned for: <white>%reason%</white>."
  permanent: "%prefix%<green>Player <yellow>%target%</yellow> has been permanently banned for: <white>%reason%</white>."
  already_banned: "%prefix%<red>Player <yellow>%target%</yellow> is already banned."
  not_banned: "%prefix%<red>Player <yellow>%target%</yellow> is not banned."
  unban_success: "%prefix%<green>Player <yellow>%target%</yellow> has been unbanned."
  screen: |
    <red><bold>YOU ARE BANNED</bold></red>
    <gray>Reason: <white>%reason%</white>
    <gray>Expires: <white>%expires%</white>
    <gray>Banned by: <white>%staff%</white>
    <gray>Appeal at: <aqua>discord.gg/yourserver</aqua>
  broadcast: "%prefix%<yellow>%target%</yellow> <red>has been banned by <yellow>%staff%</yellow>. Reason: <white>%reason%</white>."

mute:
  success: "%prefix%<green>Player <yellow>%target%</yellow> has been muted for: <white>%reason%</white>."
  permanent: "%prefix%<green>Player <yellow>%target%</yellow> has been permanently muted."
  already_muted: "%prefix%<red>Player <yellow>%target%</yellow> is already muted."
  not_muted: "%prefix%<red>Player <yellow>%target%</yellow> is not muted."
  unmute_success: "%prefix%<green>Player <yellow>%target%</yellow> has been unmuted."
  blocked: "%prefix%<red>You are muted. Expires: <yellow>%expires%</yellow>."
  broadcast: "%prefix%<yellow>%target%</yellow> <red>has been muted by <yellow>%staff%</yellow>. Reason: <white>%reason%</white>."

warn:
  success: "%prefix%<green>Player <yellow>%target%</yellow> has been warned. (<yellow>%count%/%max%</yellow> warnings)"
  received: "%prefix%<red>You have been warned by <yellow>%staff%</yellow>. Reason: <white>%reason%</white>. (<yellow>%count%/%max%</yellow> warnings)"
  no_warnings: "%prefix%<red>Player <yellow>%target%</yellow> has no warnings."
  cleared: "%prefix%<green>Warnings for <yellow>%target%</yellow> have been cleared."
  auto_ban: "%prefix%<red>Player <yellow>%target%</yellow> has been auto-banned for reaching <yellow>%max%</yellow> warnings."
  broadcast: "%prefix%<yellow>%target%</yellow> <red>has been warned by <yellow>%staff%</yellow>. Reason: <white>%reason%</white>."

kick:
  success: "%prefix%<green>Player <yellow>%target%</yellow> has been kicked."
  screen: |
    <red><bold>YOU HAVE BEEN KICKED</bold></red>
    <gray>Reason: <white>%reason%</white>
    <gray>Kicked by: <white>%staff%</white>
  broadcast: "%prefix%<yellow>%target%</yellow> <red>has been kicked by <yellow>%staff%</yellow>. Reason: <white>%reason%</white>."

history:
  header: "%prefix%<gray>Punishment history for <yellow>%target%</yellow>:"
  entry: "<gray>  [<white>%id%</white>] <yellow>%type%</yellow> by <white>%staff%</white> - %reason% (<gray>%date%</gray>)"
  empty: "%prefix%<gray>No punishment history for <yellow>%target%</yellow>."

report:
  sent: "%prefix%<green>Your report against <yellow>%target%</yellow> has been sent."
  cooldown: "%prefix%<red>You are on report cooldown. Wait <yellow>%time%</yellow> seconds."
  max_reached: "%prefix%<red>You have reached the maximum reports for this session."
  no_reason: "%prefix%<red>Please provide a reason for the report."
  staff_join_alert: "%prefix%<yellow>%player%</yellow><gray>has <red>%count% pending report(s)</red>.</gray>"
  staff_alert: "%prefix%<red><bold>REPORT</bold></red> <yellow>%reporter%</yellow> <gray>reported</gray> <yellow>%target%</yellow>: <white>%reason%</white>"
  no_reports: "%prefix%<gray>No pending reports."
  cleared: "%prefix%<green>All reports have been cleared."
  marked_as_handled: "%prefix%<green>Report #%report_id% marked as handled."

staffchat:
  format: "<dark_gray>[<red>STAFF</red>]</dark_gray> <yellow>%player%</yellow><gray>: <white>%message%</white>"
  toggle_on: "%prefix%<green>Staff chat enabled."
  toggle_off: "%prefix%<red>Staff chat disabled."

duration:
  permanent: "Permanent"
  format: "%d%h%m"

gui:
  ban_menu_title: "<red>Ban Menu - %player%"
  mute_menu_title: "<yellow>Mute Menu - %player%"
  warn_menu_title: "<orange>Warn Menu - %player%"
  history_menu_title: "<gray>History - %player%"
  close: "<red>Close"
  back: "<gray>Back"
  confirm: "<green>Confirm"
  cancel: "<red>Cancel"
