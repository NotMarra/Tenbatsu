pattern: |
  #########
  #RRRRRRR#
  #RRRRRRR#
  #RRRRRRR#
  #RRRRRRR#
  B###C###N

title: "<red>Reports"

R: # Report item
  item: PAPER
  name: "<red>Report #%report_id% - <yellow>%player%"
  lore: |
    <gray>Reporter: <yellow>%reporter_name%
    <gray>Target: <yellow>%target%
    <gray>Reason: <white>%reason%
    <gray>Date: <white>%date%
    
    <green>Left-click: <gray>Mark handled
    <yellow>Right-click: <gray>Teleport to target

B: #Back button
  item: ARROW
  name: "<white>Back"
  lore: null

C: #Close button
  item: BARRIER
  name: "<red>Close"
  lore: null

N: #Next page button
  item: ARROW
  name: "<white>Next"
  lore: null