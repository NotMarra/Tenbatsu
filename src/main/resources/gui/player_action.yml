    <gray>Ban a player from the server.
    <gray>Duration: <yellow>3 Days</yellow>
  duration: 3d
  reason: "Violation of server rules."

M:
  item: RED_DYE
  name: "<red><bold>Ban</bold></red>"
  lore: |
    <gray>Ban a player from the server.
    <gray>Duration: <yellow>Permanent</yellow>
  duration: -1
  reason: "Violation of server rules."

F:
  item: BLUE_DYE
  name: "<blue><bold>Mute</bold></blue>"
  lore: |
    <gray>Mute a player from chatting.
    <gray>Duration: <yellow>1 Day</yellow>
  duration: 1d
  reason: "Violation of server rules."

J:
  item: BLUE_DYE
  name: "<blue><bold>Mute</bold></blue>"
  lore: |
    <gray>Mute a player from chatting.
    <gray>Duration: <yellow>3 Days</yellow>
  duration: 3d
  reason: "Violation of server rules."

Q:
  item: BLUE_DYE
  name: "<blue><bold>Mute</bold></blue>"
  lore: |
    <gray>Mute a player from chatting.
    <gray>Duration: <yellow>Permanent</yellow>
  duration: -1
  reason: "Violation of server rules."

G:
